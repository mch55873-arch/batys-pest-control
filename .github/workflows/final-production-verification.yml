name: Final Batys Production Verification

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

concurrency:
  group: batys-final-production-verification-pr5
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-production:
    name: Deploy and verify final production routes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply routing patch
        run: node scripts/patch-worker-routing.mjs

      - name: Build OpenNext application
        run: npm run cf:build

      - name: Prepare Worker assets
        run: npm run worker:assets

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy

      - name: Verify live production routes
        shell: bash
        run: |
          set -euo pipefail
          check_200() {
            local label="$1"
            local url="$2"
            local result
            result=$(curl --fail-with-body --silent --show-error --location --max-redirs 8 --connect-timeout 15 --max-time 45 --output /dev/null --write-out '%{http_code}|%{url_effective}' "$url")
            local code="${result%%|*}"
            local final="${result#*|}"
            echo "$label :: $code :: $final"
            test "$code" = "200"
          }
          check_final() {
            local label="$1"
            local url="$2"
            local expected="$3"
            local result
            result=$(curl --fail-with-body --silent --show-error --location --max-redirs 8 --connect-timeout 15 --max-time 45 --output /dev/null --write-out '%{http_code}|%{url_effective}' "$url")
            local code="${result%%|*}"
            local final="${result#*|}"
            echo "$label :: $code :: $final :: expected $expected"
            test "$code" = "200"
            test "$final" = "$expected"
          }
          check_200 "Homepage" "https://batyspestcontrol.com/"
          check_200 "Services hub" "https://batyspestcontrol.com/services"
          check_200 "Service areas" "https://batyspestcontrol.com/locations"
          check_200 "Articles hub" "https://batyspestcontrol.com/articles"
          check_200 "Service detail" "https://batyspestcontrol.com/services/emergency-pest-control"
          check_final "Apex state path" "https://batyspestcontrol.com/north-carolina" "https://north-carolina.batyspestcontrol.com/"
          check_200 "Duplicate state path" "https://north-carolina.batyspestcontrol.com/north-carolina"
          check_final "Subdomain service navigation" "https://north-carolina.batyspestcontrol.com/services/emergency-pest-control" "https://batyspestcontrol.com/services/emergency-pest-control"
          check_200 "City homepage" "https://charlotte-north-carolina.batyspestcontrol.com/"
          check_200 "City local service" "https://charlotte-north-carolina.batyspestcontrol.com/emergency-pest-control"
