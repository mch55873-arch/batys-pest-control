name: Deploy Batys Pest Control to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build OpenNext application
        shell: bash
        run: |
          set -o pipefail
          npm run cf:build 2>&1 | tee opennext-build.log

      - name: Prepare lightweight Worker assets
        shell: bash
        run: |
          set -o pipefail
          npm run worker:assets 2>&1 | tee worker-assets.log

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-build-diagnostics
          path: |
            opennext-build.log
            worker-assets.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
