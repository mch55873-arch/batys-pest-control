name: Deploy Batys Pest Control to Cloudflare

on:
  push:
    branches:
      - main
    paths-ignore:
      - deployment-report.md
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm ci 2>&1 | tee npm-install.log

      - name: Remove malformed Cloudflare redirects
        id: redirect_cleanup
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/fix-cloudflare-redirects.mjs 2>&1 | tee cloudflare-redirect-cleanup.log

      - name: Apply canonical routing patch
        id: route_patch
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/patch-worker-routing.mjs 2>&1 | tee worker-routing-patch.log

      - name: Build OpenNext application
        id: opennext
        if: steps.install.outcome == 'success' && steps.route_patch.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run cf:build 2>&1 | tee opennext-build.log

      - name: Prepare lightweight Worker assets
        id: assets
        if: steps.opennext.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run worker:assets 2>&1 | tee worker-assets.log

      - name: Deploy to Cloudflare Workers
        id: deploy
        if: steps.assets.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npx wrangler deploy 2>&1 | tee wrangler-deploy.log

      - name: Verify production routes
        id: verify
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          check_200() {
            local label="$1"
            local url="$2"
            local result
            result=$(curl --fail-with-body --silent --show-error --location --max-redirs 8 --connect-timeout 15 --max-time 45 --output /dev/null --write-out '%{http_code}|%{url_effective}' "$url")
            local code="${result%%|*}"
            local final="${result#*|}"
            echo "$label :: $url :: $code :: $final"
            test "$code" = "200"
          }
          check_final() {
            local label="$1"
            local url="$2"
            local expected="$3"
            local result
            result=$(curl --fail-with-body --silent --show-error --location --max-redirs 8 --connect-timeout 15 --max-time 45 --output /dev/null --write-out '%{http_code}|%{url_effective}' "$url")
            local code="${result%%|*}"
            local final="${result#*|}"
            echo "$label :: $url :: $code :: $final :: expected $expected"
            test "$code" = "200"
            test "$final" = "$expected"
          }
          {
            check_200 "Homepage" "https://batyspestcontrol.com/"
            check_200 "Services hub" "https://batyspestcontrol.com/services"
            check_200 "Service areas" "https://batyspestcontrol.com/locations"
            check_200 "Articles hub" "https://batyspestcontrol.com/articles"
            check_200 "Service detail" "https://batyspestcontrol.com/services/emergency-pest-control"
            check_final "Apex state path" "https://batyspestcontrol.com/north-carolina" "https://north-carolina.batyspestcontrol.com/"
            check_final "Duplicate state path" "https://north-carolina.batyspestcontrol.com/north-carolina" "https://north-carolina.batyspestcontrol.com/"
            check_final "Subdomain global service link" "https://north-carolina.batyspestcontrol.com/services/emergency-pest-control" "https://batyspestcontrol.com/services/emergency-pest-control"
            check_200 "City homepage" "https://charlotte-north-carolina.batyspestcontrol.com/"
            check_200 "City local service" "https://charlotte-north-carolina.batyspestcontrol.com/emergency-pest-control"
          } 2>&1 | tee production-route-verification.log

      - name: Write deployment report
        if: always()
        shell: bash
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          REDIRECT_CLEANUP_OUTCOME: ${{ steps.redirect_cleanup.outcome }}
          ROUTE_PATCH_OUTCOME: ${{ steps.route_patch.outcome }}
          OPENNEXT_OUTCOME: ${{ steps.opennext.outcome }}
          ASSETS_OUTCOME: ${{ steps.assets.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          {
            echo '# Cloudflare Deployment Report'
            echo
            echo "- Source commit: \`$GITHUB_SHA\`"
            echo "- Run: \`$GITHUB_RUN_ID\`"
            echo "- Generated: \`$(date -u +'%Y-%m-%dT%H:%M:%SZ')\`"
            echo "- npm install: **${INSTALL_OUTCOME:-skipped}**"
            echo "- Redirect cleanup: **${REDIRECT_CLEANUP_OUTCOME:-skipped}**"
            echo "- Canonical route patch: **${ROUTE_PATCH_OUTCOME:-skipped}**"
            echo "- OpenNext build: **${OPENNEXT_OUTCOME:-skipped}**"
            echo "- Worker assets: **${ASSETS_OUTCOME:-skipped}**"
            echo "- Wrangler deploy: **${DEPLOY_OUTCOME:-skipped}**"
            echo "- Live route verification: **${VERIFY_OUTCOME:-skipped}**"
            for log in npm-install.log cloudflare-redirect-cleanup.log worker-routing-patch.log opennext-build.log worker-assets.log wrangler-deploy.log production-route-verification.log; do
              if [ -f "$log" ]; then
                echo
                echo "## $log (last 160 lines)"
                echo '```text'
                tail -n 160 "$log" | sed -E 's/(CLOUDFLARE_API_TOKEN|CLOUDFLARE_ACCOUNT_ID)=[^[:space:]]+/\1=[REDACTED]/g'
                echo '```'
              fi
            done
          } > deployment-report.md

      - name: Commit deployment report
        if: always() && github.event_name != 'pull_request'
        continue-on-error: true
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment-report.md
          git commit -m "chore: update deployment report [skip ci]" || exit 0
          git fetch origin main
          git rebase origin/main || { git rebase --abort || true; exit 0; }
          git push origin HEAD:main || true

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-build-diagnostics
          path: |
            npm-install.log
            cloudflare-redirect-cleanup.log
            worker-routing-patch.log
            opennext-build.log
            worker-assets.log
            wrangler-deploy.log
            production-route-verification.log
            deployment-report.md
          if-no-files-found: ignore
          retention-days: 3

      - name: Mark deployment failure
        if: always()
        shell: bash
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          ROUTE_PATCH_OUTCOME: ${{ steps.route_patch.outcome }}
          OPENNEXT_OUTCOME: ${{ steps.opennext.outcome }}
          ASSETS_OUTCOME: ${{ steps.assets.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          if [ "$INSTALL_OUTCOME" != "success" ] || [ "$ROUTE_PATCH_OUTCOME" != "success" ] || [ "$OPENNEXT_OUTCOME" != "success" ] || [ "$ASSETS_OUTCOME" != "success" ] || [ "$DEPLOY_OUTCOME" != "success" ] || [ "$VERIFY_OUTCOME" != "success" ]; then
            echo "Deployment or live verification failed. Check the uploaded diagnostics artifact."
            exit 1
          fi
          echo "Deployment and live route verification completed successfully."
