name: Trigger final Batys production deploy

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch verified production workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-cloudflare.yml --repo mch55873-arch/batys-pest-control --ref main
