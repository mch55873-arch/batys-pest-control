name = "batys-pest-control"
main = "src/worker.ts"
compatibility_date = "2026-07-14"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist"
binding = "ASSETS"
run_worker_first = true
html_handling = "none"
not_found_handling = "404-page"

[[routes]]
pattern = "batyspestcontrol.com/*"
zone_name = "batyspestcontrol.com"

[[routes]]
pattern = "www.batyspestcontrol.com/*"
zone_name = "batyspestcontrol.com"

[[routes]]
pattern = "*.batyspestcontrol.com/*"
zone_name = "batyspestcontrol.com"
